<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sign In | AI Music Therapy</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
</head>

<body class="font-[Poppins] bg-gradient-to-br from-indigo-900 via-slate-900 to-gray-800 text-white min-h-screen flex items-center justify-center">
  <div class="w-[90%] max-w-md bg-white/10 backdrop-blur-md rounded-3xl p-8 shadow-2xl text-center transition-all">
    <h1 class="text-3xl font-semibold mb-4">🎵 AI Music Therapy</h1>

    <input id="email" type="email" placeholder="Email"
      class="w-full p-3 rounded-xl bg-white/20 text-white placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-indigo-400 mb-3">

    <input id="password" type="password" placeholder="Password"
      class="w-full p-3 rounded-xl bg-white/20 text-white placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-indigo-400 mb-4">

    <button onclick="loginUser()"
      class="w-full bg-indigo-400 hover:bg-indigo-500 text-black font-semibold py-2 rounded-xl mb-2">
      Sign In
    </button>

    <p class="text-gray-300 text-sm mb-3">Don't have an account?</p>
    <button onclick="signupUser()" 
      class="w-full bg-green-400 hover:bg-green-500 text-black font-semibold py-2 rounded-xl">
      Sign Up
    </button>

    <p id="auth-msg" class="mt-4 text-sm text-red-300"></p>
  </div>

  <script src="script.js"></script>
</body>
</html>
